<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRAJNA — Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="/auth.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Space Grotesk', sans-serif;
      background: #0a0a0f;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 30% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 75% 75%, rgba(139, 92, 246, 0.12) 0%, transparent 55%);
      pointer-events: none;
    }

    .portal-wrap {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px;
    }

    .portal-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      margin: 0 auto 20px;
      box-shadow: 0 12px 32px rgba(99, 102, 241, 0.4);
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 12px 32px rgba(99, 102, 241, 0.4); }
      50%       { box-shadow: 0 12px 48px rgba(99, 102, 241, 0.7); }
    }

    .portal-title {
      font-size: 20px;
      font-weight: 600;
      background: linear-gradient(90deg, #a5b4fc, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .portal-sub {
      font-size: 14px;
      color: #64748b;
    }

    .dots {
      display: inline-flex;
      gap: 6px;
      margin-top: 24px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6366f1;
      opacity: 0.3;
      animation: blink 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; transform: scale(1); }
      40%            { opacity: 1;   transform: scale(1.3); }
    }
  </style>
</head>
<body>

<div class="portal-wrap">
  <div class="portal-icon">P</div>
  <div class="portal-title">Redirecting you…</div>
  <div class="portal-sub">Loading your PRAJNA dashboard</div>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<script>
  (function route() {
    const user = AUTH.getUser();

    // No valid token → login
    if (!user) {
      window.location.href = '/login.html';
      return;
    }

    const role = (user.role || '').toLowerCase();

    if (role === 'student') {
      // Build redirect with student-specific query params
      const studentId = user.studentId || user.sub || user.id || '';
      const exam      = user.exam || '';
      const params    = new URLSearchParams();
      if (studentId) params.set('id',   studentId);
      if (exam)      params.set('exam', exam);
      const qs = params.toString() ? '?' + params.toString() : '';
      window.location.href = '/student-dashboard.html' + qs;

    } else if (role === 'center' || role === 'centre' || role === 'central') {
      window.location.href = '/org-dashboard.html';

    } else {
      // Unknown role — send to login for safety
      AUTH.clearToken();
      window.location.href = '/login.html';
    }
  })();
</script>

</body>
</html>
