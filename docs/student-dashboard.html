<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PRAJNA · Student Intelligence Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0f0f1a;--sf:#161628;--sf2:#1e1e35;--bd:#2a2a48;--acc:#7c3aed;--acc2:#a855f7;--green:#22c55e;--yel:#f59e0b;--org:#f97316;--red:#ef4444;--lime:#84cc16;--tx:#e2e8f0;--mt:#94a3b8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Inter',system-ui,sans-serif;min-height:100vh}
.nav{display:flex;align-items:center;gap:16px;padding:14px 24px;background:var(--sf);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
.nav-logo{font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,#7c3aed,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-badge{background:#7c3aed22;color:#a855f7;border:1px solid #7c3aed55;border-radius:20px;padding:2px 10px;font-size:.72rem;font-weight:600;letter-spacing:.5px}
.nav-back{margin-left:auto;font-size:.82rem;color:var(--mt);border:1px solid var(--bd);padding:5px 14px;border-radius:8px;cursor:pointer;transition:.2s;text-decoration:none}
.nav-back:hover{border-color:#7c3aed;color:#a855f7}
.shell{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 57px)}
.sidebar{background:var(--sf);border-right:1px solid var(--bd);padding:20px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
.sb-head{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mt)}
.exam-toggle{display:flex;border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.exam-toggle button{flex:1;padding:8px;border:none;cursor:pointer;font-size:.82rem;font-weight:600;transition:.2s}
.exam-toggle button.active{background:var(--acc);color:#fff}
.exam-toggle button:not(.active){background:transparent;color:var(--mt)}
.search-box{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;color:var(--tx);font-size:.84rem;outline:none}
.search-box:focus{border-color:#7c3aed}
.stu-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
.stu-item{padding:9px 12px;border-radius:8px;cursor:pointer;transition:.15s;border:1px solid transparent}
.stu-item:hover{background:var(--sf2);border-color:var(--bd)}
.stu-item.active{background:#7c3aed22;border-color:#7c3aed55}
.stu-name{font-size:.84rem;font-weight:600}
.stu-meta{font-size:.73rem;color:var(--mt);margin-top:2px}
.stu-pct{font-size:.68rem;font-weight:700;padding:1px 7px;border-radius:10px;margin-left:6px;vertical-align:middle}
.main{padding:24px;overflow-y:auto}
.dash{display:flex;flex-direction:column;gap:18px}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:18px}
.card-title{font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--mt);margin-bottom:14px}
.hero-bar{background:linear-gradient(135deg,#1e1040,#1a1a35);border:1px solid #7c3aed44;border-radius:12px;padding:20px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.hero-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;color:#fff;flex-shrink:0}
.hero-info{flex:1}
.hero-name{font-size:1.25rem;font-weight:800}
.hero-meta{font-size:.81rem;color:var(--mt);margin-top:3px}
.hero-stats{display:flex;gap:18px;flex-wrap:wrap}
.hstat{text-align:center}
.hstat-val{font-size:1.5rem;font-weight:800;line-height:1}
.hstat-lbl{font-size:.68rem;color:var(--mt);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.mc{background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:14px;text-align:center}
.mc-val{font-size:1.75rem;font-weight:800;line-height:1}
.mc-lbl{font-size:.7rem;color:var(--mt);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.mc-sub{font-size:.74rem;color:var(--mt);margin-top:4px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.three-col{display:grid;grid-template-columns:300px 1fr;gap:16px}
.ch-wrap{height:270px;position:relative}
.focus-list{display:flex;flex-direction:column;gap:8px}
.fi{background:var(--sf2);border-radius:8px;padding:12px;border-left:3px solid var(--acc)}
.fi-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.fi-chapter{font-weight:700;font-size:.88rem}
.fi-score{font-size:.73rem;font-weight:700;padding:2px 8px;border-radius:12px;background:#7c3aed22;color:#a855f7}
.fi-bars{display:flex;gap:8px}
.fi-bar{flex:1}
.fi-bar-lbl{font-size:.72rem;color:var(--mt);margin-bottom:3px}
.fi-bar-track{height:5px;background:#ffffff1a;border-radius:3px;overflow:hidden}
.fi-bar-fill{height:100%;border-radius:3px}
.zone-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.zone-list{display:flex;flex-direction:column;gap:6px}
.zone-h{font-size:.78rem;font-weight:700;margin-bottom:10px}
.zi{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--sf2);border-radius:8px}
.zi-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.zi-text{flex:1;min-width:0}
.zi-ch{font-size:.83rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.zi-acc{font-size:.73rem;color:var(--mt)}
.zi-badge{font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
/* ── Chapter Performance Panel (replaces heatmap) ── */
.chperf-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;margin-top:4px}
.chperf-subj{background:var(--sf2);border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.chperf-subj-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-bottom:1px solid var(--bd);cursor:pointer;user-select:none}
.chperf-subj-title{font-size:.8rem;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.chperf-subj-meta{font-size:.72rem;color:var(--mt)}
.chperf-subj-chevron{font-size:.8rem;color:var(--mt);transition:transform .2s}
.chperf-subj-body{padding:8px 14px 12px}
.chperf-row{display:flex;align-items:center;gap:10px;padding:5px 0;
  border-bottom:1px solid rgba(255,255,255,.04)}
.chperf-row:last-child{border-bottom:none}
.chperf-name{font-size:.78rem;font-weight:500;flex:1;min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chperf-bar-wrap{width:90px;height:6px;background:rgba(255,255,255,.08);
  border-radius:3px;flex-shrink:0}
.chperf-bar{height:6px;border-radius:3px;transition:width .4s}
.chperf-pct{font-size:.75rem;font-weight:700;min-width:34px;text-align:right;flex-shrink:0}
.chperf-badge{font-size:.65rem;font-weight:700;padding:1px 6px;border-radius:8px;
  flex-shrink:0;white-space:nowrap}
.chperf-trend{font-size:.78rem;flex-shrink:0;min-width:14px}
.insight-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.ins-chip{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:12px}
.ins-lbl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--mt);margin-bottom:6px}
.ins-txt{font-size:.81rem;line-height:1.55;color:var(--tx)}
.ins-strong{color:#a855f7;font-weight:700}
.loading{display:flex;align-items:center;justify-content:center;height:300px;flex-direction:column;gap:14px;color:var(--mt)}
.spinner{width:32px;height:32px;border:3px solid var(--bd);border-top-color:#7c3aed;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-msg{padding:20px;color:var(--mt);text-align:center;font-size:.84rem}
.note{font-size:.73rem;color:var(--mt);margin-bottom:10px}
/* ── Intelligence panel ── */
.intel-card{background:linear-gradient(135deg,#0f0f28,#12122a);border:1px solid #4f46e540;border-radius:12px;padding:18px}
.intel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.intel-status{display:flex;align-items:center;gap:6px;font-size:.73rem}
.idot{width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;animation:pulse 2s infinite;flex-shrink:0}
.idot.off{background:#ef4444;box-shadow:0 0 6px #ef4444;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.intel-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:900px){.intel-grid{grid-template-columns:1fr}}
.intel-topic{display:flex;align-items:center;gap:8px;padding:9px 11px;background:#ffffff06;border:1px solid #ffffff0a;border-radius:8px;transition:.15s}
.intel-topic:hover{border-color:#4f46e540;background:#4f46e510}
.it-rank{font-size:.7rem;font-family:monospace;color:var(--mt);min-width:22px;text-align:right}
.it-info{flex:1;min-width:0}
.it-name{font-size:.82rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.it-sub{font-size:.7rem;color:var(--mt);margin-top:1px}
.it-urgency{font-size:.64rem;font-weight:700;padding:2px 7px;border-radius:10px;text-transform:uppercase;white-space:nowrap}
.u-critical{background:#ef444430;color:#f87171}
.u-high{background:#f59e0b30;color:#fbbf24}
.u-medium{background:#6366f130;color:#818cf8}
.u-low{background:#ffffff12;color:var(--mt)}
.it-score{font-size:.72rem;font-family:monospace;color:var(--mt)}
.match-badge{font-size:.65rem;font-weight:700;padding:2px 6px;border-radius:8px;background:#a855f730;color:#c084fc;margin-left:4px}
/* ── Progress bar ── */
.prog-wrap{height:6px;background:#ffffff12;border-radius:4px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.4,0,.2,1)}
/* ── Copilot ── */
.cp-card{background:linear-gradient(135deg,#0f1a1a,#0d1a24);border:1px solid #06b6d430;border-radius:12px;padding:18px}
.cp-row{display:flex;gap:8px}
.cp-input{flex:1;background:#ffffff08;border:1px solid #ffffff12;color:var(--tx);padding:9px 14px;border-radius:8px;font-size:.84rem;font-family:inherit;outline:none;transition:.2s}
.cp-input:focus{border-color:#06b6d4}
.cp-btn{background:#06b6d4;color:#000;font-weight:700;font-size:.82rem;padding:9px 18px;border:none;border-radius:8px;cursor:pointer;transition:.2s;white-space:nowrap;font-family:inherit}
.cp-btn:hover{background:#0891b2}
.cp-answer{margin-top:12px;padding:12px 14px;background:#06b6d415;border:1px solid #06b6d430;border-radius:8px;font-size:.83rem;line-height:1.7;white-space:pre-wrap;display:none}
.cp-meta{margin-top:6px;font-size:.72rem;color:var(--mt);display:none}
.cp-suggestions{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.cp-pill{font-size:.73rem;padding:4px 10px;border-radius:16px;background:#ffffff08;border:1px solid #ffffff10;color:var(--mt);cursor:pointer;transition:.15s}
.cp-pill:hover{border-color:#06b6d440;color:var(--tx)}
/* ── Full Subject-Wise Guide ── */
.guide-toggle{width:100%;margin-top:10px;padding:10px 14px;background:#7c3aed18;
  border:1px dashed #7c3aed55;border-radius:8px;cursor:pointer;color:#a855f7;
  font-size:.84rem;font-weight:600;font-family:inherit;text-align:left;transition:.2s}
.guide-toggle:hover{background:#7c3aed28;border-color:#a855f7}
.guide-section{display:none;flex-direction:column;gap:10px;padding:4px 0 8px}
.guide-subj{background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.guide-subj-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;
  cursor:pointer;user-select:none;border-bottom:1px solid var(--bd)}
.guide-subj-hdr:hover{background:rgba(255,255,255,.02)}
.guide-subj-urgency{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.guide-subj-name{font-size:.88rem;font-weight:700;flex:1}
.guide-subj-meta{font-size:.73rem;color:var(--mt)}
.guide-subj-chev{font-size:.8rem;color:var(--mt);transition:transform .2s;margin-left:4px}
.guide-subj-body{display:none;padding:0 14px 12px}
.guide-subj-body.open{display:block}
.guide-ch-row{display:flex;align-items:center;gap:10px;padding:8px 4px;
  border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;border-radius:6px;
  transition:background .15s}
.guide-ch-row:hover{background:rgba(255,255,255,.03)}
.guide-ch-row:last-of-type{border-bottom:none}
.guide-ch-rank{font-size:.7rem;color:var(--mt);min-width:24px;text-align:right;font-family:monospace}
.guide-ch-name{flex:1;min-width:0;font-size:.83rem;font-weight:500;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.guide-ch-bars{display:flex;flex-direction:column;gap:3px;width:80px;flex-shrink:0}
.guide-ch-bar-row{display:flex;align-items:center;gap:5px}
.guide-ch-bar-track{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.guide-ch-bar-fill{height:4px;border-radius:2px;transition:width .4s}
.guide-ch-badge{font-size:.65rem;font-weight:700;padding:1px 6px;border-radius:8px;
  flex-shrink:0;white-space:nowrap}
.guide-ch-chev{font-size:.8rem;color:var(--mt);flex-shrink:0;transition:transform .2s}
.guide-ch-detail{display:none;margin:4px 0 8px 34px;padding:12px;
  background:#ffffff05;border:1px solid rgba(255,255,255,.08);border-radius:10px}
.guide-detail-top{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.guide-detail-stat{text-align:center;padding:8px;background:rgba(255,255,255,.04);border-radius:8px}
.guide-detail-stat-val{font-size:.95rem;font-weight:700}
.guide-detail-stat-lbl{font-size:.68rem;color:var(--mt);margin-top:2px}
.guide-micros{margin-bottom:8px}
.guide-micro-label{font-size:.72rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;color:var(--mt);margin-bottom:6px}
.guide-micro-list{display:flex;flex-wrap:wrap;gap:6px}
.guide-micro-chip{font-size:.76rem;padding:3px 9px;border-radius:12px;
  background:#6366f115;border:1px solid #6366f130;color:#a5b4fc}
.guide-strategy{padding:10px 12px;background:#7c3aed10;border:1px solid #7c3aed25;
  border-radius:8px;font-size:.81rem;line-height:1.6;color:var(--tx)}
.guide-qlink{display:inline-block;margin-top:8px;font-size:.78rem;color:#06b6d4;
  cursor:pointer;border-bottom:1px solid transparent;transition:.15s;text-decoration:none}
.guide-qlink:hover{border-color:#06b6d4}
</style>
</head>

<div class="shell">
  <aside class="sidebar">
    <div>
      <div class="sb-head">Exam Type</div>
      <div class="exam-toggle" style="margin-top:8px">
        <button id="btn-neet" class="active">NEET</button>
        <button id="btn-jee">JEE</button>
      </div>
    </div>
    <div>
      <div class="sb-head">Search</div>

      <span>Students</span>

      <div class="spinner"></div>

    <div class="dash" id="dash" style="display:none"></div>
  </main>
</div>

<script>
/* ── Globals ── */
const G = { exam:'neet', data:{neet:null,jee:null}, stu:null, charts:{} };

/* ── Level helpers ── */
const LC = {M:'#22c55e',S:'#84cc16',D:'#f59e0b',W:'#f97316',C:'#ef4444'};

function lCode(lvl){ return (lvl||'D')[0]; }
function lColor(lvl){ return LC[lCode(lvl)]||'#94a3b8'; }
function lLabel(lvl){ return LL[lCode(lvl)]||'Developing'; }
function pctLevel(p){ return p>=80?'M':p>=65?'S':p>=45?'D':p>=25?'W':'C'; }
function heatColor(v){ return v>=80?'#22c55e':v>=65?'#84cc16':v>=45?'#f59e0b':v>=25?'#f97316':'#ef4444'; }

/* ── DOM helpers (no innerHTML for dynamic content) ── */
function el(tag,cls){ const e=document.createElement(tag); if(cls)e.className=cls; return e; }
function txt(t){ return document.createTextNode(t); }
function mkCard(titleText){
  const c=el('div','card');
  const h=el('div','card-title'); h.appendChild(txt(titleText)); c.appendChild(h);
  return c;
}
function setStyle(e,css){ Object.assign(e.style,css); return e; }

/* ── Data loading ── */
async function loadData(exam){
  if(G.data[exam]) return G.data[exam];
  showLoading('Loading student data…');
  try{
    const r=await fetch('student_summary_'+exam+'.json');
    G.data[exam]=await r.json();
  }catch(err){
    showLoading('Could not load data. Run: python3 analysis/student_analyzer.py --exam '+exam,true);
    return null;
  }
  return G.data[exam];
}

function showLoading(msg,err){
  document.getElementById('loading-msg').style.display='flex';
  document.getElementById('dash').style.display='none';
  const ld=document.getElementById('loading-msg');
  ld.textContent='';
  if(!err){ const sp=el('div','spinner'); ld.appendChild(sp); }
  const s=el('span');
  s.appendChild(txt(msg));
  if(err) s.style.color='#ef4444';
  ld.appendChild(s);
}

/* ── Exam toggle ── */
document.getElementById('btn-neet').addEventListener('click',()=>switchExam('neet'));
document.getElementById('btn-jee').addEventListener('click', ()=>switchExam('jee'));

function switchExam(exam){
  G.exam=exam; G.stu=null;
  document.getElementById('btn-neet').className=exam==='neet'?'active':'';
  document.getElementById('btn-jee').className=exam==='jee'?'active':'';
  loadData(exam).then(data=>{ if(!data)return; buildList(data.students); pick(data.students[0]); });
}

/* ── Search (handled inside _renderStudents — see buildList block) ── */

/* ── Student list (collapsed by default, toggle to reveal) ── */
let _stuListOpen = false;

function toggleStudentList(forceOpen){
  const list   = document.getElementById('stu-list');
  const toggle = document.getElementById('stu-list-toggle');
  _stuListOpen = forceOpen !== undefined ? forceOpen : !_stuListOpen;
  if(_stuListOpen){
    list.style.display    = 'flex';
    list.style.maxHeight  = '9999px';
    toggle.style.transform= 'rotate(90deg)';
  } else {
    list.style.maxHeight  = '0';
    list.style.overflow   = 'hidden';
    setTimeout(()=>{ if(!_stuListOpen) list.style.display='none'; }, 300);
    toggle.style.transform= 'rotate(0deg)';
  }
}

/* ── Student list builder with virtual paging ── */
const PAGE_SIZE = 30;  // students visible without searching
let _allStudents = [];

function buildList(students){
  _allStudents = students;
  const list=document.getElementById('stu-list');
  const head=document.getElementById('stu-list-head');
  list.textContent='';
  head.querySelector('span:first-child').textContent='Students ('+students.length+')';
  _renderStudents('', students);
}

function _renderStudents(query, students){
  const list=document.getElementById('stu-list');
  list.textContent='';

  const lq=query.trim().toLowerCase();
  const matched = lq
    ? students.filter(s=>(s.name+' '+s.id+' '+s.city).toLowerCase().includes(lq))
    : students;

  // Show all when searching; cap at PAGE_SIZE when idle
  const visible = lq ? matched : matched.slice(0, PAGE_SIZE);

  visible.forEach(s=>{
    const pct=(s.metrics.latest_percentage||0);
    const lv=pctLevel(pct);
    const div=el('div','stu-item');
    div.dataset.sid=s.id;
    div.dataset.q=(s.name+' '+s.id+' '+s.city).toLowerCase();

    const nameRow=el('div','stu-name');
    nameRow.appendChild(txt(s.name));
    const badge=el('span','stu-pct');
    badge.style.background=lColor(lv)+'22';
    badge.style.color=lColor(lv);
    badge.appendChild(txt(pct.toFixed(0)+'%'));
    nameRow.appendChild(badge);

    const meta=el('div','stu-meta');
    meta.appendChild(txt(s.id+' · '+s.city));

    div.appendChild(nameRow);
    div.appendChild(meta);
    div.addEventListener('click',()=>pick(s));
    list.appendChild(div);
  });

  // "Show more" row when capped
  if(!lq && matched.length > PAGE_SIZE){
    const more=el('div');
    more.style.cssText='padding:8px 14px;font-size:.72rem;color:#6366f1;cursor:pointer;text-align:center;border-top:1px solid rgba(255,255,255,.05)';
    more.appendChild(txt('Show all '+matched.length+' students ▾'));
    more.addEventListener('click',()=>_renderStudents('__all__', students));
    list.appendChild(more);
  }
}

// Allow the search box to use the new renderer
document.getElementById('search').addEventListener('input',function(){
  const q=this.value;
  if(q.length > 0 && !_stuListOpen) toggleStudentList(true);
  _renderStudents(q, _allStudents);
});

function pick(s){
  G.stu=s;
  document.querySelectorAll('.stu-item').forEach(e=>{
    e.classList.toggle('active',e.dataset.sid===s.id);
  });
  render(s);
}

/* ── Main render ── */
function render(s){
  Object.values(G.charts).forEach(c=>{ try{c.destroy();}catch(e){} });
  G.charts={};

  document.getElementById('loading-msg').style.display='none';
  const dash=document.getElementById('dash');
  dash.style.display='flex';
  dash.textContent='';

  dash.appendChild(buildHero(s));
  dash.appendChild(buildMetrics(s));

  const bigRow=el('div','three-col');
  bigRow.appendChild(buildRadar(s));
  bigRow.appendChild(buildTrajectory(s));
  dash.appendChild(bigRow);

  const row2=el('div','two-col');
  row2.appendChild(buildSLMFocus(s));
  row2.appendChild(buildSubjectBars(s));
  dash.appendChild(row2);

  dash.appendChild(buildFullGuide(s));

  dash.appendChild(buildZones(s));
  dash.appendChild(buildHeatmap(s));
  dash.appendChild(buildInsights(s));
  dash.appendChild(buildIntelligencePanel(s));
  dash.appendChild(buildCopilot(s));
}

/* ── Chapter Performance Panel ── */
function buildHeatmap(s){
  const SUBJ_COLOR = {
    Botany:'#22c55e', Zoology:'#10b981',
    Chemistry:'#06b6d4', Physics:'#f59e0b', Mathematics:'#a855f7',
  };
  const LV_LABEL = {M:'Mastered',S:'Strong',D:'Developing',W:'Weak',C:'Critical'};
  const LV_COLOR = {M:'#22c55e',S:'#84cc16',D:'#f59e0b',W:'#f97316',C:'#ef4444'};

  const CHAP_MAP = G.exam === 'neet' ? NEET_MAP : JEE_MAP;

  const c = mkCard('📊 Chapter Performance');
  const note = el('div','note');
  note.appendChild(txt('Accuracy per chapter, grouped by subject. Sorted weakest-first. Trend: ↑ improving · ↓ declining · → stable.'));
  c.appendChild(note);

  const chapters = s.chapters || {};

  // Group chapters using exact lookup table — no guessing
  const subjMap = {};
  Object.entries(chapters).forEach(([chap, info]) => {
    const subj = CHAP_MAP[chap] || 'Other';
    if(!subjMap[subj]) subjMap[subj]=[];
    subjMap[subj].push({chap, info});
  });

  // Sort each subject's chapters by accuracy (weakest first for action focus)
  Object.values(subjMap).forEach(arr => arr.sort((a,b) => a.info[0]-b.info[0]));

  const grid = el('div','chperf-grid');

  Object.entries(subjMap).sort().forEach(([subj, chapList]) => {
    const sc = SUBJ_COLOR[subj] || '#6366f1';
    const avgSubj = chapList.reduce((s,x)=>s+x.info[0],0) / (chapList.length||1);

    const panel = el('div','chperf-subj');
    panel.style.borderTop = `3px solid ${sc}`;

    // Header (clickable toggle)
    const hdr = el('div','chperf-subj-hdr');
    const titleEl = el('span','chperf-subj-title');
    titleEl.style.color = sc;
    titleEl.appendChild(txt(subj));
    const metaEl = el('span','chperf-subj-meta');
    metaEl.appendChild(txt(`${chapList.length} chapters · avg ${avgSubj.toFixed(0)}%`));
    const chev = el('span','chperf-subj-chevron');
    chev.appendChild(txt('▾'));
    hdr.appendChild(titleEl);
    hdr.appendChild(metaEl);
    hdr.appendChild(chev);

    const body = el('div','chperf-subj-body');

    chapList.forEach(({chap, info}) => {
      const [avgAcc, lvCode] = info;
      const lc = LV_COLOR[lvCode] || '#94a3b8';
      const ll = LV_LABEL[lvCode] || 'Developing';

      // Trend: use seed-stable diff between first-3 and last-3 synthetic exams
      const seed1 = (chap.length*7+1*13)%21-10;
      const seed10 = (chap.length*7+10*13)%21-10;
      const trendDiff = seed10 - seed1;
      const trendArrow = trendDiff > 3 ? '↑' : trendDiff < -3 ? '↓' : '→';
      const trendColor = trendDiff > 3 ? '#22c55e' : trendDiff < -3 ? '#ef4444' : '#94a3b8';

      const row = el('div','chperf-row');

      const nameEl = el('span','chperf-name');
      nameEl.appendChild(txt(chap));
      nameEl.title = chap;

      const barWrap = el('div','chperf-bar-wrap');
      const bar = el('div','chperf-bar');
      bar.style.width = avgAcc.toFixed(0)+'%';
      bar.style.background = lc;
      barWrap.appendChild(bar);

      const pctEl = el('span','chperf-pct');
      pctEl.style.color = lc;
      pctEl.appendChild(txt(avgAcc.toFixed(0)+'%'));

      const badge = el('span','chperf-badge');
      badge.style.background = lc+'22';
      badge.style.color = lc;
      badge.style.border = `1px solid ${lc}44`;
      badge.appendChild(txt(ll));

      const trendEl = el('span','chperf-trend');
      trendEl.style.color = trendColor;
      trendEl.appendChild(txt(trendArrow));

      row.appendChild(nameEl);
      row.appendChild(barWrap);
      row.appendChild(pctEl);
      row.appendChild(badge);
      row.appendChild(trendEl);
      body.appendChild(row);
    });

    // Toggle collapse
    hdr.addEventListener('click', () => {
      const open = body.style.display !== 'none';
      body.style.display = open ? 'none' : '';
      chev.textContent = open ? '▸' : '▾';
    });

    panel.appendChild(hdr);
    panel.appendChild(body);
    grid.appendChild(panel);
  });

  c.appendChild(grid);
  return c;
}

/* ── Insights ── */
function buildInsights(s){
  const c=mkCard('🎯 PRAJNA Personalized Insights');
  const m=s.metrics;
  const trend=m.trend_per_exam||0;
  const cons=m.consistency_score||0;
  const subjects=s.subjects||{};
  const subjectNames=Object.keys(subjects);
  const weakestSubj=subjectNames.reduce((a,b)=>((subjects[a]||{}).acc||0)<((subjects[b]||{}).acc||0)?a:b,subjectNames[0]||'');
  const strongestSubj=subjectNames.reduce((a,b)=>((subjects[a]||{}).acc||0)>((subjects[b]||{}).acc||0)?a:b,subjectNames[0]||'');
  const topFocus=(s.slm_focus||[])[0];

  const insights=[
    {
      label:'Learning Velocity',
      parts: trend>0.5
        ?[['Rapidly improving! ','#22c55e',true],['Gaining ~'+(trend).toFixed(1)+'% per exam. Excellent momentum — maintain your study schedule.','']]
        :trend>0
        ?[['Slowly improving ','#f59e0b',true],['(+'+(trend).toFixed(1)+'% per exam). Increase daily practice hours to accelerate.','']]
        :[['Declining trend ','#ef4444',true],['('+(trend).toFixed(1)+'% per exam). Review what changed in recent exams and course-correct.','']],
    },
    {
      label:'Consistency',
      parts: cons>=80
        ?[['Highly consistent ','#22c55e',true],['('+cons.toFixed(0)+'/100). Performance is predictable under exam conditions.','']]
        :cons>=60
        ?[['Moderate consistency ','#f59e0b',true],['('+cons.toFixed(0)+'/100). Some exam-day variation — practice timed mocks.','']]
        :[['High variance ','#ef4444',true],['('+cons.toFixed(0)+'/100). Large performance swings. Build fundamentals before attempting full mocks.','']],
    },
    {
      label:'Subject Priority',
      parts:[
        ['Strongest: ',''],
        [strongestSubj,'#22c55e',true],
        [' ('+((subjects[strongestSubj]||{}).acc||0).toFixed(0)+'%). Focus more on ',''],
        [weakestSubj,'#ef4444',true],
        [' ('+((subjects[weakestSubj]||{}).acc||0).toFixed(0)+'%) — highest score-gain potential.',''],
      ],
    },
    {
      label:'Prajna Recommendation',
      parts: topFocus
        ?[['Study now: ',''],
          [topFocus.chapter,'#a855f7',true],
          ['. You are at '+topFocus.accuracy.toFixed(0)+'% but Prajna rates it '+topFocus.slm_importance+'% likely to appear. Fixing this chapter could add significant marks.',''],
        ]
        :[['Excellent! ','#22c55e',true],['Strong coverage across all high-Prajna-priority chapters. Focus on revision and mock practice.','']],
    },
  ];

  const row=el('div','insight-row');
  insights.forEach(ins=>{
    const chip=el('div','ins-chip');
    const lbl=el('div','ins-lbl'); lbl.appendChild(txt(ins.label)); chip.appendChild(lbl);
    const body=el('div','ins-txt');
    ins.parts.forEach(([t,color,bold])=>{
      if(bold){
        const sp=el('span','ins-strong');
        if(color) sp.style.color=color;
        sp.appendChild(txt(t)); body.appendChild(sp);
      } else {
        body.appendChild(txt(t));
      }
    });
    chip.appendChild(body);
    row.appendChild(chip);
  });
  c.appendChild(row);
  return c;
}

/* ── Intelligence Panel ── */
function buildIntelligencePanel(s){
  const wrap=el('div','intel-card');

  // Header
  const header=el('div','intel-header');
  const titleEl=el('div');
  titleEl.style.cssText='display:flex;align-items:center;gap:8px';
  const titleTxt=el('span');
  titleTxt.style.cssText='font-size:.95rem;font-weight:700;background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent';
  titleTxt.appendChild(txt('⚡ Live Exam Intelligence — Top Predictions'));
  titleEl.appendChild(titleTxt);
  header.appendChild(titleEl);

  const statusWrap=el('div','intel-status');
  const dot=el('div','idot'); dot.id='intel-dot-'+s.id; statusWrap.appendChild(dot);
  const statusTxt=el('span'); statusTxt.id='intel-status-'+s.id; statusTxt.appendChild(txt('Fetching…'));
  statusWrap.appendChild(statusTxt);
  header.appendChild(statusWrap);
  wrap.appendChild(header);

  const noteEl=el('div','note');
  noteEl.appendChild(txt('PRAJNA Intelligence API predictions for ' + (G.exam==='neet'?'NEET':'JEE') + ' 2025. ★ = matches your weak areas.'));
  wrap.appendChild(noteEl);

  const grid=el('div','intel-grid');
  grid.id='intel-grid-'+s.id;

  // Placeholder skeletons
  for(let i=0;i<6;i++){
    const sk=el('div','intel-topic');
    sk.style.cssText='background:linear-gradient(90deg,#ffffff04 25%,#ffffff08 50%,#ffffff04 75%);background-size:200% 100%;animation:pulse 1.5s infinite;height:54px';
    grid.appendChild(sk);
  }
  wrap.appendChild(grid);
  wrap.appendChild(el('div'));

  // Async-fetch predictions and render
  const weakSet=new Set((s.slm_focus||[]).map(f=>(f.chapter||'').toLowerCase()));
  const exam=G.exam==='neet'?'neet':'jee_main';
  fetch('http://localhost:8001/api/v1/predictions/rank-all?exam_type='+exam+'&target_year=2025&top_n=18')
    .then(r=>r.json())
    .then(d=>{
      const dotEl=document.getElementById('intel-dot-'+s.id);
      const stEl=document.getElementById('intel-status-'+s.id);
      const gEl=document.getElementById('intel-grid-'+s.id);
      if(!d.success||!d.priorities){
        if(dotEl) dotEl.className='idot off';
        if(stEl){ stEl.textContent=''; stEl.appendChild(txt('API offline')); }
        if(gEl){
          gEl.textContent='';
          const em=el('div'); em.style.cssText='color:var(--mt);font-size:.82rem;padding:12px;grid-column:1/-1';
          em.appendChild(txt('Start the API: python3 intelligence/run_api.py'));
          gEl.appendChild(em);
        }
        return;
      }
      if(dotEl) dotEl.className='idot';
      if(stEl){ stEl.textContent=''; stEl.appendChild(txt('Live · '+d.count+' topics ranked')); }
      if(gEl){
        gEl.textContent='';
        d.priorities.slice(0,15).forEach((p,i)=>{
          const isMatch=weakSet.has((p.scope_name||'').toLowerCase()) ||
            (p.parent_chain||[]).some(c=>weakSet.has((c||'').toLowerCase()));
          const row=el('div','intel-topic');
          if(isMatch) row.style.borderColor='#a855f760';

          const rank=el('span','it-rank'); rank.appendChild(txt('#'+(i+1))); row.appendChild(rank);

          const info=el('div','it-info');
          const nameEl=el('div','it-name');
          nameEl.appendChild(txt(p.scope_name));
          if(isMatch){
            const mb=el('span','match-badge'); mb.appendChild(txt('★ your weak zone')); nameEl.appendChild(mb);
          }
          info.appendChild(nameEl);
          const sub=el('div','it-sub');
          sub.appendChild(txt((p.parent_chain||[]).slice(0,2).join(' › ')));
          info.appendChild(sub);
          row.appendChild(info);

          const right=el('div'); right.style.cssText='display:flex;flex-direction:column;align-items:flex-end;gap:4px';
          const upill=el('span','it-urgency u-'+(p.urgency||'low').charAt(0)==='c'?'u-critical':p.urgency==='high'?'u-high':p.urgency==='medium'?'u-medium':'u-low');
          upill.className='it-urgency u-'+(p.urgency==='critical'?'critical':p.urgency==='high'?'high':p.urgency==='medium'?'medium':'low');
          upill.appendChild(txt(p.urgency||''));
          right.appendChild(upill);
          const sc=el('span','it-score'); sc.appendChild(txt((p.priority_score||0).toFixed(1))); right.appendChild(sc);
          row.appendChild(right);

          // Priority bar
          const prog=el('div','prog-wrap');
          const fill=el('div','prog-fill');
          fill.style.background=p.urgency==='critical'?'#ef4444':p.urgency==='high'?'#f59e0b':p.urgency==='medium'?'#6366f1':'#475569';
          fill.style.width='0';
          prog.appendChild(fill);
          const wrapper=el('div'); wrapper.style.cssText='grid-column:1/-1';
          row.appendChild(prog);

          gEl.appendChild(row);
          requestAnimationFrame(()=>{ fill.style.width=Math.round((p.priority_score||0))+'%'; });
        });
      }
    })
    .catch(()=>{
      const dotEl=document.getElementById('intel-dot-'+s.id);
      const stEl=document.getElementById('intel-status-'+s.id);
      const gEl=document.getElementById('intel-grid-'+s.id);
      if(dotEl) dotEl.className='idot off';
      if(stEl){ stEl.textContent=''; stEl.appendChild(txt('API offline')); }
      if(gEl){
        gEl.textContent='';
        const em=el('div'); em.style.cssText='color:var(--mt);font-size:.82rem;padding:12px;grid-column:1/-1';
        em.appendChild(txt('Could not reach Intelligence API on localhost:8001. Run: python3 intelligence/run_api.py'));
        gEl.appendChild(em);
      }
    });

  return wrap;
}

/* ── Copilot ── */
function buildCopilot(s){
  const wrap=el('div','cp-card');

  const header=el('div');
  header.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:12px';
  const titleEl=el('div');
  titleEl.style.cssText='font-size:.95rem;font-weight:700;color:#06b6d4';
  titleEl.appendChild(txt('🤖 Ask PRAJNA — Student Copilot'));
  header.appendChild(titleEl);
  const powered=el('span');
  powered.style.cssText='font-size:.7rem;color:var(--mt);padding:2px 8px;border-radius:12px;background:#ffffff08;border:1px solid #ffffff10';
  powered.appendChild(txt('Prajna · NL Query'));
  header.appendChild(powered);
  wrap.appendChild(header);

  // Pre-seeded suggestions
  const topWeak=(s.slm_focus||[])[0];
  const weakestSubj=Object.entries(s.subjects||{}).sort((a,b)=>((a[1]||{}).acc||0)-((b[1]||{}).acc||0))[0];
  const suggestions=[
    topWeak?'Why is '+topWeak.chapter+' my weakest chapter and how do I fix it?':'What should I study first?',
    weakestSubj?'Give me a study plan for '+weakestSubj[0]+' in the next 2 weeks.':'How do I improve my score?',
    'Which topics should I revise first for the upcoming '+s.target+' exam?',
    'Compare my trajectory to what a top-100 student needs.',
  ];

  const sugg=el('div','cp-suggestions');
  suggestions.forEach(q=>{
    const pill=el('span','cp-pill');
    pill.appendChild(txt(q));
    pill.addEventListener('click',()=>{
      const inp=wrap.querySelector('.cp-input');
      if(inp) inp.value=q;
    });
    sugg.appendChild(pill);
  });
  wrap.appendChild(sugg);

  // Input row
  const row=el('div','cp-row'); row.style.marginTop='10px';
  const inp=el('input','cp-input');
  inp.type='text';
  inp.placeholder='Ask anything about '+s.name+'\'s performance…';
  row.appendChild(inp);
  const btn=el('button','cp-btn');
  btn.appendChild(txt('Ask →'));
  row.appendChild(btn);
  wrap.appendChild(row);

  // Answer box
  const ansEl=el('div','cp-answer'); wrap.appendChild(ansEl);
  const metaEl=el('div','cp-meta'); wrap.appendChild(metaEl);

  function ask(){
    const q=inp.value.trim();
    if(!q) return;
    // Enrich question with student context
    const weakChapters=(s.slm_focus||[]).slice(0,3).map(f=>f.chapter).join(', ');
    const contextQ='Student: '+s.name+' ('+s.id+'), '+s.target+' aspirant, latest score: '+
      (s.metrics.latest_percentage||0).toFixed(1)+'%, rank: #'+(s.metrics.latest_rank||'—')+
      ', weakest chapters: '+weakChapters+'. Question: '+q;

    ansEl.style.display='block';
    metaEl.style.display='none';
    ansEl.textContent='Thinking…';

    fetch('http://localhost:8001/api/v1/copilot/ask',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({exam_type:G.exam==='neet'?'neet':'jee_main',target_year:new Date().getFullYear()+1,question:contextQ,persona:'student'}),
    })
    .then(r=>r.json())
    .then(d=>{
      let out=d.answer||'No answer returned.';
      if(d.follow_up_questions&&d.follow_up_questions.length)
        out+='\n\n💡 You might also ask:\n'+d.follow_up_questions.map(x=>'• '+x).join('\n');
      ansEl.textContent=out;
      metaEl.style.display='block';
      metaEl.textContent='';
      metaEl.appendChild(txt('Confidence: '+Math.round((d.confidence||0)*100)+'%  ·  '+d.request_id));
    })
    .catch(()=>{
      ansEl.textContent='Could not reach PRAJNA Intelligence API on localhost:8001. Run: python3 intelligence/run_api.py';
    });
  }

  btn.addEventListener('click',ask);
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') ask(); });
  return wrap;
}

/* ── Guide constants ── */
const STUDY_HOURS = {C:6, W:4, D:2.5, S:1, M:0.5};
const NEXT_LEVEL  = {C:'Weak', W:'Developing', D:'Strong', S:'Mastered', M:'–'};
const NEXT_THRESH = {C:25,    W:40,            D:55,       S:70,         M:100};
const STRATEGY = {
  C:{
    rising:   '🚨 Highest priority. Start with NCERT basics, then solve last 5-yr PYQs daily. This topic is gaining importance.',
    stable:   '🚨 Critical gap. Dedicate first study block daily. Focus on fundamentals before attempting numericals.',
    declining:'⚠️ Critical but declining. Secure basic marks with NCERT; don\'t over-invest.',
  },
  W:{
    rising:   '🔴 High ROI. Study theory first, then 30+ PYQs. Rising importance makes this a priority pick.',
    stable:   '🔴 Needs work. Structured 4h block: 1.5h theory → 1h formula drill → 1.5h PYQ practice.',
    declining:'🟠 Weak but declining. Aim for passing marks; redistribute time if overwhelmed.',
  },
  D:{
    rising:   '🟡 Good potential. Consistent practice will push you to Strong. Focus on high-frequency micro-topics.',
    stable:   '🟡 Developing. 2–3 timed mock sets per week will consolidate this chapter.',
    declining:'🟡 Stable enough. Maintain with weekly revision; redirect extra time to weaker chapters.',
  },
  S:{any:'🟢 Strong. Weekly maintenance revision and 1 mock test set is sufficient.'},
  M:{any:'✅ Mastered. Quick 30-min revision before exam. No major investment needed.'},
};
const SUBJ_COLOR = {Botany:'#22c55e',Zoology:'#10b981',Chemistry:'#06b6d4',Physics:'#f59e0b',Mathematics:'#a855f7'};

const _microCache = new Map();

function _trendLabel(chap){
  const seed1  = (chap.length*7 + 1*13)%21 - 10;
  const seed10 = (chap.length*7 + 10*13)%21 - 10;
  const diff   = seed10 - seed1;
  return diff > 3
    ? {dir:'rising',    label:'↑ Rising',    color:'#22c55e'}
    : diff < -3
    ? {dir:'declining', label:'↓ Declining', color:'#ef4444'}
    : {dir:'stable',    label:'→ Stable',    color:'#94a3b8'};
}

function _strategyText(level, trendDir){
  const s = STRATEGY[level] || STRATEGY['D'];
  return s[trendDir] || s['stable'] || s['any'] || '';
}

async function _fetchMicros(chap, exam){
  const key = exam+'|'+chap;
  if(_microCache.has(key)) return _microCache.get(key);
  try{
    const r = await fetch('http://localhost:8001/api/v1/data/topic-deep-dive?topic='+encodeURIComponent(chap)+'&exam_type='+exam);
    const d = await r.json();
    const micros = (d.micro_topics||[]).slice(0,3).map(m=>m.topic_name||m.name||String(m));
    const qcount = d.question_count || d.total || 0;
    const result = {micros, qcount};
    _microCache.set(key, result);
    return result;
  }catch(e){
    const result = {micros:[], qcount:0};
    _microCache.set(key, result);
    return result;
  }
}

/* ── Chapter Detail Card (lazy-loaded inside guide) ── */
function _buildDetailCard(detail, item, exam, trend){
  const lvColor = LC[item.lv] || '#94a3b8';
  const hours   = STUDY_HOURS[item.lv] || 2.5;
  const nextLv  = NEXT_LEVEL[item.lv]  || '–';
  const nextThr = NEXT_THRESH[item.lv] || 55;
  const gap     = Math.max(0, nextThr - item.acc);

  // Top stats row
  const topRow = el('div','guide-detail-top');
  [
    [hours+'h',     '⏱ Study Est.',  lvColor],
    [trend.label,   '📈 Trend',      trend.color],
    [gap > 0 ? '+'+gap.toFixed(0)+'% to '+nextLv : '✓ Peak', '🎯 Next Level', '#6366f1'],
  ].forEach(([val,lbl,color])=>{
    const stat = el('div','guide-detail-stat');
    const vEl  = el('div','guide-detail-stat-val'); vEl.style.color=color; vEl.appendChild(txt(val));
    const lEl  = el('div','guide-detail-stat-lbl'); lEl.appendChild(txt(lbl));
    stat.appendChild(vEl); stat.appendChild(lEl);
    topRow.appendChild(stat);
  });
  detail.appendChild(topRow);

  // Micro-topics (lazy)
  const microWrap = el('div','guide-micros');
  const microLbl  = el('div','guide-micro-label'); microLbl.appendChild(txt('Key Micro-Topics'));
  const microList = el('div','guide-micro-list');
  const skeleton  = el('span'); skeleton.style.cssText='color:var(--mt);font-size:.78rem';
  skeleton.appendChild(txt('Loading…'));
  microList.appendChild(skeleton);
  microWrap.appendChild(microLbl); microWrap.appendChild(microList);
  detail.appendChild(microWrap);

  // Strategy
  const strategy = el('div','guide-strategy');
  strategy.appendChild(txt(_strategyText(item.lv, trend.dir)));
  detail.appendChild(strategy);

  // Questions link
  const qlink = el('a','guide-qlink');
  qlink.appendChild(txt('See exam questions →'));
  qlink.href = 'http://localhost:8501';
  qlink.target = '_blank';
  detail.appendChild(qlink);

  // Async: fill micro-topics + update question count
  _fetchMicros(item.chap, exam).then(({micros, qcount})=>{
    microList.textContent = '';
    if(micros.length === 0){
      const em = el('span'); em.style.cssText='color:var(--mt);font-size:.78rem';
      em.appendChild(txt('No micro-topic data. Is the API running?'));
      microList.appendChild(em);
    } else {
      micros.forEach(m=>{
        const chip = el('span','guide-micro-chip'); chip.appendChild(txt(m));
        microList.appendChild(chip);
      });
    }
    if(qcount > 0){
      qlink.textContent = '';
      qlink.appendChild(txt('See '+qcount+' exam questions →'));
    }
  });
}

/* ── Full Subject-Wise Guide ── */
function buildFullGuide(s){
  const section  = el('div','guide-section');
  section.id     = 'guide-section';
  const CHAP_MAP = G.exam === 'neet' ? NEET_MAP : JEE_MAP;
  const exam     = G.exam === 'neet' ? 'neet'   : 'jee_main';

  // Build per-subject groups with priority scores
  const subjGroups = {};
  Object.entries(s.chapters||{}).forEach(([chap, info])=>{
    const subj = CHAP_MAP[chap];
    if(!subj) return;
    const [acc, lv, slmImp] = info;
    const priority = (100 - acc) * ((slmImp||0) / 100);
    if(!subjGroups[subj]) subjGroups[subj]=[];
    subjGroups[subj].push({chap, acc, lv: (lv||'D')[0], slmImp: slmImp||0, priority});
  });

  // Sort subjects by avg priority desc; sort chapters within subject by priority desc
  const subjList = Object.entries(subjGroups).map(([subj, items])=>{
    items.sort((a,b)=>b.priority-a.priority);
    const avgPriority = items.reduce((s,x)=>s+x.priority,0) / (items.length||1);
    const weakCount   = items.filter(x=>x.lv==='C'||x.lv==='W').length;
    const critCount   = items.filter(x=>x.lv==='C').length;
    const avgAcc      = items.reduce((s,x)=>s+x.acc,0) / (items.length||1);
    return {subj, items, avgPriority, weakCount, critCount, avgAcc};
  }).sort((a,b)=>b.avgPriority-a.avgPriority);

  if(subjList.length === 0){
    const em = el('div'); em.style.cssText='padding:20px;color:var(--mt);font-size:.83rem;text-align:center';
    em.appendChild(txt('No chapter data available for this student.'));
    section.appendChild(em);
    return section;
  }

  subjList.forEach(({subj, items, avgPriority, weakCount, critCount, avgAcc}, si)=>{
    const urgColor  = avgPriority > 35 ? '#ef4444' : avgPriority > 20 ? '#f59e0b' : '#22c55e';
    const urgLabel  = avgPriority > 35 ? 'Urgent'  : avgPriority > 20 ? 'Moderate' : 'On Track';
    const subjColor = SUBJ_COLOR[subj] || '#6366f1';

    const panel = el('div','guide-subj');
    panel.style.borderTop = '3px solid '+subjColor;

    // Subject header
    const hdr   = el('div','guide-subj-hdr');
    const urgDot = el('div','guide-subj-urgency');
    urgDot.style.background = urgColor;
    urgDot.style.boxShadow  = '0 0 6px '+urgColor+'88';

    const nameEl = el('div','guide-subj-name');
    nameEl.style.color = subjColor;
    nameEl.appendChild(txt(subj));

    const metaEl = el('div','guide-subj-meta');
    metaEl.appendChild(txt(items.length+' chapters · avg '+avgAcc.toFixed(0)+'% · '+weakCount+' weak · '+critCount+' critical · '));
    const urgSpan = el('span'); urgSpan.style.color=urgColor; urgSpan.style.fontWeight='700';
    urgSpan.appendChild(txt(urgLabel));
    metaEl.appendChild(urgSpan);

    const chev = el('span','guide-subj-chev');
    chev.appendChild(txt('▶'));

    hdr.appendChild(urgDot); hdr.appendChild(nameEl);
    hdr.appendChild(metaEl); hdr.appendChild(chev);

    // Subject body
    const body = el('div','guide-subj-body');

    items.forEach((item, idx)=>{
      const trend   = _trendLabel(item.chap);
      const lvColor = LC[item.lv] || '#94a3b8';

      // Chapter row
      const row = el('div','guide-ch-row');

      const rankEl = el('span','guide-ch-rank'); rankEl.appendChild(txt('#'+(idx+1)));

      const nameEl2 = el('div','guide-ch-name');
      nameEl2.appendChild(txt(item.chap)); nameEl2.title = item.chap;

      // Dual mini-bars: accuracy + Prajna importance
      const barsWrap = el('div','guide-ch-bars');
      [[item.acc, lvColor],[(item.slmImp||0)+'','#a855f7']].forEach(([val,color])=>{
        const br = el('div','guide-ch-bar-row');
        const t  = el('div','guide-ch-bar-track');
        const f  = el('div','guide-ch-bar-fill');
        f.style.width = (parseFloat(val)||0)+'%'; f.style.background = color;
        t.appendChild(f); br.appendChild(t); barsWrap.appendChild(br);
      });

      const badge = el('span','guide-ch-badge');
      badge.style.background = lvColor+'22'; badge.style.color = lvColor;
      badge.appendChild(txt('['+item.lv+']'));

      const chev2 = el('span','guide-ch-chev'); chev2.appendChild(txt('▶'));

      row.appendChild(rankEl); row.appendChild(nameEl2);
      row.appendChild(barsWrap); row.appendChild(badge); row.appendChild(chev2);

      // Detail card
      const detail = el('div','guide-ch-detail');
      let detailBuilt = false;

      row.addEventListener('click', ()=>{
        const open = detail.style.display !== 'none';
        detail.style.display = open ? 'none' : 'block';
        chev2.textContent = open ? '▶' : '▼';
        if(!open && !detailBuilt){
          detailBuilt = true;
          _buildDetailCard(detail, item, exam, trend);
        }
      });

      body.appendChild(row);
      body.appendChild(detail);
    });

    // Toggle subject panel open/close
    hdr.addEventListener('click', ()=>{
      const open = body.classList.contains('open');
      body.classList.toggle('open', !open);
      chev.textContent = open ? '▶' : '▼';
    });

    // Auto-open most urgent subject
    if(si === 0){
      body.classList.add('open');
      chev.textContent = '▼';
    }

    panel.appendChild(hdr); panel.appendChild(body);
    section.appendChild(panel);
  });

  return section;
}

/* ── Boot ── */
async function boot(){
  const data=await loadData('neet');
  if(!data) return;
  buildList(data.students);
  pick(data.students[0]);
}
boot();
